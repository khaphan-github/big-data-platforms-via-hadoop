version: "3.8"

services:
  # Spark Master
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "6066:6066"
    networks:
      - spark_network
    command: bin/spark-class org.apache.spark.deploy.master.Master

  # Spark Worker
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    networks:
      - spark_network
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  # Trending Words Transformation Job
  trending-words-job:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trending-words-job
    depends_on:
      - spark-master
    environment:
      HDFS_INPUT: "hdfs://namenode:9000/raw_zone"
      HDFS_OUTPUT: "hdfs://namenode:9000/work_zone/table_trending_words"
      SPARK_MASTER: "spark://spark-master:7077"
      EXECUTOR_MEMORY: "2G"
      EXECUTOR_CORES: "2"
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./:/app
    networks:
      - spark_network

  # Scheduler Service for periodic Spark job execution
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: trending-words-scheduler
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: "spark://spark-master:7077"
      HDFS_INPUT: "hdfs://namenode:9000/raw_zone"
      HDFS_OUTPUT: "hdfs://namenode:9000/work_zone/table_trending_words"
      SCHEDULE_INTERVAL: "3600" # Run every hour (in seconds)
      EXECUTOR_MEMORY: "2G"
      EXECUTOR_CORES: "2"
    volumes:
      - ./data/output:/data/output
      - ./:/app
    networks:
      - spark_network

volumes:
  spark_data:

networks:
  spark_network:
    driver: bridge
