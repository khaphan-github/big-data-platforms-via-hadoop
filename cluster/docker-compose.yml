services:
  hadoop-base:
    image: cluster-hadoop-3.3.6:base
    build:
      context: .
      dockerfile: images/Dockerfile.base
    profiles:
      - build-only

  # HDFS Cluster
  namenode:
    image: cluster-hadoop-3.3.6:namenode
    build:
      context: .
      dockerfile: images/Dockerfile.namenode
      args:
        HADOOP_BASE_IMAGE: cluster-hadoop-3.3.6:base
    container_name: hadoop-namenode
    ports:
      - "9870:9870"
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    networks:
      - hadoop-cluster
    healthcheck:
      test: ["CMD", "hdfs", "dfsadmin", "-report"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  datanode1:
    image: cluster-hadoop-3.3.6:datanode
    build:
      context: .
      dockerfile: images/Dockerfile.datanode
      args:
        HADOOP_BASE_IMAGE: cluster-hadoop-3.3.6:base
    container_name: hadoop-datanode1
    ports:
      - "9864:9864"
    volumes:
      - datanode1-data:/var/lib/hadoop-hdfs/cache/dfs/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site-datanode1.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-cluster

  datanode2:
    image: cluster-hadoop-3.3.6:datanode
    build:
      context: .
      dockerfile: images/Dockerfile.datanode
      args:
        HADOOP_BASE_IMAGE: cluster-hadoop-3.3.6:base
    container_name: hadoop-datanode2
    ports:
      - "9865:9865"
    volumes:
      - datanode2-data:/var/lib/hadoop-hdfs/cache/dfs/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site-datanode2.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-cluster

