# Minimal defaults for Spark Standalone + HDFS
spark.hadoop.fs.defaultFS hdfs://namenode:9000

# Cluster manager
spark.master spark://spark-master:7077

# Resource defaults
spark.executor.memory 2g
spark.executor.cores 2
spark.driver.memory 1g
spark.driver.cores 1

# Runtime
spark.app.name Spark-Application
spark.local.dir /var/lib/spark/work

# Serialization
spark.serializer org.apache.spark.serializer.KryoSerializer

# RPC Configuration (fixes frame size errors)
spark.network.timeout 120
spark.rpc.message.maxSize 256
spark.rpc.numRetries 3
spark.rpc.retry.wait 1
spark.network.maxRemoteBlockSizeFetchToMem 256m
spark.shuffle.service.enabled false

# Java serialization for compatibility
spark.rpc.askTimeout 120s

# Driver network (client mode from host machine)
# spark.driver.host must be set via --conf at submit time to the host IP reachable from Docker
spark.driver.port 7079
spark.driver.bindAddress 0.0.0.0
